<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Genesis — Scroll to Form the Earth · Particle GPU/CPU Stress Test</title>
<style>
  :root { color-scheme: dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; background: #01010a; font-family: ui-monospace, "SF Mono", Menlo, monospace; }
  body { height: 460vh; }                 /* tall page → scroll drives formation */
  #app { position: fixed; inset: 0; z-index: 0; }
  canvas { display: block; touch-action: pan-y; }

  /* toggle button (navbar-style) */
  #hudToggle {
    position: fixed; top: 12px; left: 12px; z-index: 12;
    width: 42px; height: 42px; border-radius: 12px; cursor: pointer;
    background: rgba(8,10,22,.62); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(120,160,255,.28); color: #9fe6ff; font-size: 18px;
    display: flex; align-items: center; justify-content: center; user-select: none;
    box-shadow: 0 6px 24px rgba(0,0,0,.45); transition: background .15s, transform .15s;
  }
  #hudToggle:active { transform: scale(.92); }

  #hud {
    position: fixed; top: 62px; left: 12px; z-index: 11;
    background: rgba(8,10,22,.62); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(120,160,255,.22); border-radius: 14px; padding: 13px 15px; width: 236px; max-width: calc(100vw - 24px);
    color: #cfe0ff; font-size: 12px; line-height: 1.5; box-shadow: 0 8px 40px rgba(0,0,0,.5); user-select: none;
    transition: opacity .25s ease, transform .25s ease;
  }
  /* hidden state — card slides up out of the way, toggle stays */
  body.hud-hidden #hud { opacity: 0; transform: translateY(-12px) scale(.97); pointer-events: none; }
  #hud h1 { font-size: 12px; letter-spacing: .12em; text-transform: uppercase; color: #7fd1ff; margin-bottom: 10px; font-weight: 700; }
  .row { display: flex; justify-content: space-between; gap: 14px; margin: 3px 0; }
  .row .k { color: #8aa0c8; } .row .v { color: #eaf2ff; font-variant-numeric: tabular-nums; font-weight: 600; }
  .bar { height: 6px; border-radius: 6px; background: rgba(255,255,255,.08); overflow: hidden; margin: 2px 0 9px; }
  .bar > i { display: block; height: 100%; width: 0%; border-radius: 6px; transition: width .12s linear; }
  .fps > i { background: linear-gradient(90deg,#33ff99,#00d0ff); }
  .frame > i { background: linear-gradient(90deg,#ffd24d,#ff5d8f); }
  .mem > i { background: linear-gradient(90deg,#9b8cff,#ff7adf); }
  .gpu > i { background: linear-gradient(90deg,#00e5ff,#7c4dff); }
  .form > i { background: linear-gradient(90deg,#2fe0c0,#3aa0ff,#9b6bff); }
  small.note { display:block; color:#6b80a8; font-size:10px; margin-top:2px; }

  #panel { position: fixed; bottom: 14px; left: 14px; right: 14px; z-index: 10;
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    background: rgba(8,10,22,.58); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(120,160,255,.22); border-radius: 14px; padding: 10px 14px; color:#cfe0ff; font-size:12px; }
  #panel label { display:flex; align-items:center; gap:8px; }
  #panel input[type=range]{ width: 140px; accent-color:#00d0ff; }
  #panel .val{ min-width: 84px; color:#7fd1ff; font-weight:700; font-variant-numeric: tabular-nums; }
  #panel button{ background: rgba(0,208,255,.14); border:1px solid rgba(0,208,255,.4); color:#bff0ff;
    border-radius: 9px; padding: 7px 12px; cursor:pointer; font: inherit; }
  #panel button:hover{ background: rgba(0,208,255,.26); }
  #panel button.on{ background: rgba(120,255,180,.2); border-color:rgba(120,255,180,.55); color:#d6ffe6; }
  #panel button.danger{ background: rgba(255,90,120,.16); border-color:rgba(255,90,120,.5); color:#ffc4d0; }
  #panel button{ display:inline-flex; align-items:center; gap:6px; }
  button svg, #hudToggle svg{ width:15px; height:15px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; flex:none; }
  #hudToggle svg{ width:19px; height:19px; }

  #hint{ position:fixed; top:14px; right:14px; z-index:10; color:#7d93bd; font-size:11px; text-align:right; line-height:1.7; }
  #hint b{ color:#9fe6ff; }
  #scrollcue{ position:fixed; left:50%; bottom:74px; transform:translateX(-50%); z-index:9;
    color:#bcd3ff; font-size:12px; letter-spacing:.18em; text-transform:uppercase; opacity:.85;
    animation:bob 1.8s ease-in-out infinite; pointer-events:none; }
  @keyframes bob{ 0%,100%{ transform:translate(-50%,0); opacity:.4 } 50%{ transform:translate(-50%,8px); opacity:.95 } }
  #title{ position:fixed; left:50%; top:42%; transform:translate(-50%,-50%); z-index:8; text-align:center;
    pointer-events:none; color:#eaf3ff; }
  #title h2{ font-family:Georgia, serif; font-weight:400; font-size:clamp(22px,5vw,52px); letter-spacing:.04em;
    text-shadow:0 0 30px rgba(80,160,255,.4); }
  #title p{ color:#86a0cc; font-size:12px; letter-spacing:.3em; text-transform:uppercase; margin-top:10px; }

  /* ---- mobile ---- */
  @media (max-width: 640px) {
    #hud { top: 58px; left: 10px; right: 10px; width: auto; font-size: 11px; padding: 11px 13px; }
    #hud .bar { height: 5px; margin: 2px 0 7px; }
    #hint { display: none; }
    #panel { gap: 8px; padding: 9px 11px; bottom: 10px; left: 10px; right: 10px; }
    #panel input[type=range]{ width: 100%; }
    #panel label:first-child { flex: 1 1 100%; }
    #panel button { flex: 1 1 auto; padding: 9px 8px; }
  }
</style>
</head>
<body>
<div id="app"></div>

<div id="hudToggle" title="show / hide stats"><svg viewBox="0 0 24 24"><line x1="6" y1="20" x2="6" y2="13"/><line x1="12" y1="20" x2="12" y2="8"/><line x1="18" y1="20" x2="18" y2="4"/></svg></div>

<div id="title"><h2>Genesis</h2><p>scroll to gather the world</p></div>

<div id="hud">

  <div class="row"><span class="k">JS Heap</span><span class="v" id="mem">—</span></div>

<div id="hint">
  <b>SCROLL ↓</b> — particles gather into Earth<br/>
  drag — orbit · pinch — zoom<br/>
  raise the slider, then form the world

<div id="panel">
  <label>Particles
    <input id="slider" type="range" min="50000" max="10000000" step="50000" value="1500000" />
    <span class="val" id="sliderVal">1,500,000</span>
  </label>
  <button id="sound"><svg viewBox="0 0 24 24"><path d="M11 5 6 9H2v6h4l5 4z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18.5 5.5a9 9 0 0 1 0 13"/></svg><span>Sound on</span></button>
  <button id="max"><svg viewBox="0 0 24 24"><polygon points="13 2 3 14 11 14 9 22 21 10 13 10 13 2"/></svg>10M MAX</button>
  <button id="insane"><svg viewBox="0 0 24 24"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 17c1.5 0 2.5-1 2.5-3 0-1.5-1-2.3-1-4 0-2 1.5-3 1.5-3s-.5 3 2 4.5c1.6 1 2.5 2.3 2.5 4A6.5 6.5 0 1 1 7 9c0 2 1.5 3 1.5 5.5z"/></svg>25M</button>
  <button id="billion" class="danger"><svg viewBox="0 0 24 24"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>1 Billion</button>
  <button id="top"><svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>Re-form</button>
</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x01010a, 0.0022);
const camera = new THREE.PerspectiveCamera(58, innerWidth / innerHeight, 0.1, 5000);
let camDist = 320, yaw = 0.4, pitch = 0.22;

const gl = renderer.getContext();
const dbg = gl.getExtension('WEBGL_debug_renderer_info');
const gpuName = dbg ? gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) : 'WebGL device';
document.getElementById('renderer').textContent = '⛭ ' + String(gpuName).slice(0, 46);

// soft round sprite
const sprite = (() => {
  const c = document.createElement('canvas'); c.width = c.height = 64; const g = c.getContext('2d');
  const grd = g.createRadialGradient(32,32,0,32,32,32);
  grd.addColorStop(0,'rgba(255,255,255,1)'); grd.addColorStop(.3,'rgba(255,255,255,.8)'); grd.addColorStop(1,'rgba(255,255,255,0)');
  g.fillStyle = grd; g.fillRect(0,0,64,64);
  const t = new THREE.CanvasTexture(c); t.needsUpdate = true; return t;
})();

const R = 110;            // earth radius
const starsBg = makeStars();

// ----- load real Earth map so continents land in the right place -----
let earthData = null, earthW = 0, earthH = 0;
function loadEarth() {
  return new Promise(res => {
    const img = new Image(); img.crossOrigin = 'anonymous';
    img.onload = () => {
      const cw = 1024, ch = 512, cv = document.createElement('canvas'); cv.width = cw; cv.height = ch;
      const cx = cv.getContext('2d'); cx.drawImage(img, 0, 0, cw, ch);
      try { earthData = cx.getImageData(0,0,cw,ch).data; earthW = cw; earthH = ch; } catch(e) { earthData = null; }
      res();
    };
    img.onerror = () => res();
    img.src = 'https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/earth_atmos_2048.jpg';
  });
}
// sample earth color (r,g,b 0..1) + isLand, at lat/lon direction (nx,ny,nz unit)
function sampleEarth(nx, ny, nz, out) {
  const u = 0.5 - Math.atan2(nz, nx) / (2*Math.PI);   // flip longitude → correct east/west
  const v = 0.5 - Math.asin(ny) / Math.PI;
  if (earthData) {
    const px = Math.min(earthW-1, (u*earthW)|0), py = Math.min(earthH-1, (v*earthH)|0);
    const i = (py*earthW + px)*4;
    out.r = earthData[i]/255; out.g = earthData[i+1]/255; out.b = earthData[i+2]/255;
    out.land = (out.g*0.8 + out.r*0.5) > (out.b*0.95 + 0.06);   // greenish/brown over blue
  } else {
    // fallback: latitude bands of blue ocean + green land blobs
    const land = (Math.sin(u*40) + Math.cos(v*30) + Math.sin((u+v)*22)) > 1.1;
    if (land) { out.r=.15; out.g=.5+.2*Math.random(); out.b=.18; out.land=true; }
    else { out.r=.05; out.g=.22; out.b=.45+.15*Math.random(); out.land=false; }
  }
}

// ---- shader: morph scattered(broken) -> earth sphere, brighten as it forms ----
const vert = `
  attribute vec3 aHome;     // final earth-surface position
  attribute float aPhase;
  uniform float uProgress;  // 0 broken -> 1 earth
  uniform float uTime;
  uniform float uSize;
  uniform vec3 uSun;        // world-space sun direction
  varying vec3 vColor;
  void main(){
    float p = smoothstep(0.0, 1.0, uProgress);
    // broken/chaotic drift while scattered
    vec3 chaos = position + vec3(
      sin(uTime*0.6 + aPhase)*18.0,
      cos(uTime*0.5 + aPhase*1.7)*18.0,
      sin(uTime*0.7 + aPhase*0.6)*18.0) * (1.0 - p);
    vec3 pos = mix(chaos, aHome, p);

    // sun lighting on the formed globe → day/night terminator, real 3D look
    vec3 wN = normalize(mat3(modelMatrix) * normalize(aHome));
    float diff = max(dot(wN, normalize(uSun)), 0.0);
    float lit = 0.12 + 0.95 * diff;                 // ambient + lambert
    float light = mix(1.0, lit, p);                 // scattered debris stays fully lit

    vColor = color * light;
    vec4 mv = modelViewMatrix * vec4(pos, 1.0);
    gl_PointSize = uSize * (300.0 / -mv.z) * (0.8 + p*0.4);
    gl_Position = projectionMatrix * mv;
  }`;
const frag = `
  uniform sampler2D uMap; varying vec3 vColor;
  void main(){ float a = texture2D(uMap, gl_PointCoord).a; if(a<0.35) discard;
    gl_FragColor = vec4(vColor, 1.0); }`;

let points=null, material=null, currentCount=0;
const earthGroup = new THREE.Group(); scene.add(earthGroup);

function build(n) {
  if (points) { earthGroup.remove(points); points.geometry.dispose(); }
  const scatter = new Float32Array(n*3);
  const home = new Float32Array(n*3);
  const col = new Float32Array(n*3);
  const phase = new Float32Array(n);
  const s = { r:0, g:0, b:0, land:false };

  for (let i=0;i<n;i++){
    // broken scatter: huge sphere of debris
    const rr = 120 + Math.pow(Math.random(),0.4)*380;
    const t1 = Math.random()*Math.PI*2, p1 = Math.acos(2*Math.random()-1);
    scatter[i*3]   = rr*Math.sin(p1)*Math.cos(t1);
    scatter[i*3+1] = rr*Math.sin(p1)*Math.sin(t1);
    scatter[i*3+2] = rr*Math.cos(p1);

    // uniform point on sphere -> earth surface
    const u = Math.random(), vv = Math.random();
    const theta = 2*Math.PI*u, phi = Math.acos(2*vv-1);
    const nx = Math.sin(phi)*Math.cos(theta), ny = Math.cos(phi), nz = Math.sin(phi)*Math.sin(theta);
    sampleEarth(nx, ny, nz, s);
    const elev = s.land ? R + 2.5 : R - 0.5;     // land sits slightly proud → 3D relief
    home[i*3]   = nx*elev; home[i*3+1] = ny*elev; home[i*3+2] = nz*elev;

    // natural photo colors — keep the map's own tones, gently graded
    let r=s.r, g=s.g, b=s.b;
    if (s.land) { r=r*0.85+0.04; g=g*0.95+0.06; b=b*0.6+0.02; }      // earthy green/brown
    else        { r=r*0.4+0.01;  g=g*0.6+0.04;  b=Math.min(1,b*0.95+0.12); } // deep ocean blue
    col[i*3]=r; col[i*3+1]=g; col[i*3+2]=b;
    phase[i]=Math.random()*Math.PI*2;
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(scatter,3));
  geo.setAttribute('aHome', new THREE.BufferAttribute(home,3));
  geo.setAttribute('color', new THREE.BufferAttribute(col,3));
  geo.setAttribute('aPhase', new THREE.BufferAttribute(phase,1));

  material = new THREE.ShaderMaterial({
    uniforms:{ uProgress:{value:progress}, uTime:{value:0}, uSize:{value:3.0},
      uMap:{value:sprite}, uSun:{value:new THREE.Vector3(0.7,0.35,0.6).normalize()} },
    vertexShader:vert, fragmentShader:frag,
    transparent:true, depthWrite:true, depthTest:true, blending:THREE.NormalBlending, vertexColors:true,
  });
  points = new THREE.Points(geo, material);
  earthGroup.add(points);
  currentCount = n;
}

// atmosphere halo
const atmo = new THREE.Mesh(
  new THREE.SphereGeometry(R*1.18, 48, 48),
  new THREE.ShaderMaterial({
    transparent:true, blending:THREE.AdditiveBlending, side:THREE.BackSide, depthWrite:false,
    uniforms:{ uP:{value:0} },
    vertexShader:`varying vec3 vN; void main(){ vN=normalize(normalMatrix*normal); gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
    fragmentShader:`varying vec3 vN; uniform float uP; void main(){ float i=pow(0.7-dot(vN,vec3(0,0,1.0)),3.0); gl_FragColor=vec4(0.25,0.6,1.0,1.0)*i*uP; }`,
  })
);
earthGroup.add(atmo);

function makeStars(){
  const n=4000, pos=new Float32Array(n*3);
  for(let i=0;i<n;i++){ const r=1500+Math.random()*1500, t=Math.random()*Math.PI*2, p=Math.acos(2*Math.random()-1);
    pos[i*3]=r*Math.sin(p)*Math.cos(t); pos[i*3+1]=r*Math.sin(p)*Math.sin(t); pos[i*3+2]=r*Math.cos(p); }
  const g=new THREE.BufferGeometry(); g.setAttribute('position',new THREE.BufferAttribute(pos,3));
  const m=new THREE.PointsMaterial({size:2,color:0x99bbff,transparent:true,opacity:0.7,depthWrite:false});
  const pts=new THREE.Points(g,m); scene.add(pts); return pts;
}

// ---- GPU timer ----
const tq = gl.getExtension('EXT_disjoint_timer_query_webgl2') || gl.getExtension('EXT_disjoint_timer_query');
let gq=null, lastGpuMs=0;
function gpuBegin(){ if(!tq||gq) return; if(tq.beginQueryEXT){gq=tq.createQueryEXT();tq.beginQueryEXT(tq.TIME_ELAPSED_EXT,gq);} else if(gl.createQuery){gq=gl.createQuery();gl.beginQuery(tq.TIME_ELAPSED_EXT,gq);} }
function gpuEnd(){ if(!gq) return; if(tq.endQueryEXT){tq.endQueryEXT(tq.TIME_ELAPSED_EXT); if(tq.getQueryObjectEXT(gq,tq.QUERY_RESULT_AVAILABLE_EXT)){lastGpuMs=tq.getQueryObjectEXT(gq,tq.QUERY_RESULT_EXT)/1e6;tq.deleteQueryEXT(gq);gq=null;}} else if(gl.endQuery){gl.endQuery(tq.TIME_ELAPSED_EXT); if(gl.getQueryParameter(gq,gl.QUERY_RESULT_AVAILABLE)){lastGpuMs=gl.getQueryParameter(gq,gl.QUERY_RESULT)/1e6;gl.deleteQuery(gq);gq=null;}} }

// ---- stats ----
const $=id=>document.getElementById(id), fmt=n=>n.toLocaleString('en-US');
let frames=0,fpsAcc=0,lastT=performance.now(),fps=0,frameMs=0;
const setBar=(el,p)=>el.style.width=Math.max(0,Math.min(100,p))+'%';
function updateHUD(){
  $('fps').textContent=fps.toFixed(0); setBar($('fpsBar'),fps/60*100);
  $('frame').textContent=frameMs.toFixed(1)+' ms'; setBar($('frameBar'),frameMs/33.3*100);
  if(performance.memory){const u=performance.memory.usedJSHeapSize/1048576,l=performance.memory.jsHeapSizeLimit/1048576;
    $('mem').textContent=u.toFixed(0)+' / '+l.toFixed(0)+' MB'; setBar($('memBar'),u/l*100);} else $('mem').textContent='n/a (Chrome)';
  if(tq){$('gpu').textContent=lastGpuMs>0?lastGpuMs.toFixed(2)+' ms':'sampling…'; setBar($('gpuBar'),lastGpuMs/16.6*100);}
  else {$('gpu').textContent='~'+(frameMs*0.7).toFixed(1)+' ms est'; setBar($('gpuBar'),frameMs*0.7/16.6*100);}
  $('formv').textContent=(progress*100).toFixed(0)+'%'; setBar($('formBar'),progress*100);
  $('count').textContent=fmt(currentCount);
}

// ---- HUD show/hide (navbar style) + auto-hide on scroll ----
document.body.classList.add('hud-hidden');         // hidden by default
let hudPinned = false;                              // user explicitly opened it
$('hudToggle').addEventListener('click', ()=>{
  hudPinned = document.body.classList.contains('hud-hidden');
  document.body.classList.toggle('hud-hidden', !hudPinned);
});

// ---- scroll-driven formation ----
let progress=0, target=0;
function readScroll(){
  const max=document.body.scrollHeight-innerHeight; target = max>0 ? Math.min(1, scrollY/max) : 0;
  document.body.classList.add('hud-hidden'); hudPinned=false;   // always hide while scrolling
}
addEventListener('scroll', readScroll, { passive:true });

// ---- ambient interactive audio ----
let audio=null, master=null, filter=null, audioOn=false;
function startAudio(){
  const Ctx = window.AudioContext||window.webkitAudioContext; if(!Ctx) return;
  audio = new Ctx();
  master = audio.createGain(); master.gain.value = 0.0001;
  filter = audio.createBiquadFilter(); filter.type='lowpass'; filter.frequency.value=500;
  const delay = audio.createDelay(); delay.delayTime.value=0.55;
  const fb = audio.createGain(); fb.gain.value=0.35;
  delay.connect(fb); fb.connect(delay);
  filter.connect(master); filter.connect(delay); delay.connect(master);
  master.connect(audio.destination);
  // ambient drone — root, fifth, octave, shimmer
  [110, 164.81, 220, 329.63].forEach((f,i)=>{
    const o=audio.createOscillator(); o.type = i<2?'sine':'triangle'; o.frequency.value=f;
    const g=audio.createGain(); g.gain.value = 0.18/(i+1);
    const lfo=audio.createOscillator(); lfo.frequency.value=0.05+i*0.03;
    const lg=audio.createGain(); lg.gain.value=f*0.004;
    lfo.connect(lg); lg.connect(o.detune); lfo.start();
    o.connect(g); g.connect(filter); o.start();
  });
  audioOn=true;
}
function updateAudio(){
  if(!audioOn||!audio) return;
  const now=audio.currentTime;
  master.gain.setTargetAtTime(0.06 + progress*0.22, now, 0.3);    // swells as world forms
  filter.frequency.setTargetAtTime(400 + progress*progress*3200, now, 0.4);
}

// ---- loop ----
let clock=0;
function animate(){
  requestAnimationFrame(animate);
  const t0=performance.now(); clock+=0.016;
  progress += (target-progress)*0.07;
  if(material){ material.uniforms.uProgress.value=progress; material.uniforms.uTime.value=clock; }
  atmo.material.uniforms.uP.value = Math.max(0,(progress-0.45))*0.8;

  earthGroup.rotation.y += 0.0016 + progress*0.0014;   // earth spins, faster once formed
  starsBg.rotation.y += 0.0002;

  // fade title/cue as world forms
  document.getElementById('title').style.opacity = Math.max(0, 1-progress*2.2);
  document.getElementById('scrollcue').style.opacity = progress>0.05 ? 0 : '';

  camera.position.set(Math.sin(yaw)*Math.cos(pitch)*camDist, Math.sin(pitch)*camDist, Math.cos(yaw)*Math.cos(pitch)*camDist);
  camera.lookAt(0,0,0);

  updateAudio();
  gpuBegin(); renderer.render(scene,camera); gpuEnd();

  frameMs=performance.now()-t0;
  frames++; fpsAcc+=performance.now()-lastT; lastT=performance.now();
  if(fpsAcc>=250){ fps=frames*1000/fpsAcc; frames=0; fpsAcc=0; updateHUD(); }
}

// ---- orbit input (drag), pinch zoom ----
let dragging=false,px=0,py=0;
const dom=renderer.domElement;
dom.addEventListener('pointerdown',e=>{dragging=true;px=e.clientX;py=e.clientY;});
addEventListener('pointerup',()=>dragging=false);
addEventListener('pointermove',e=>{ if(!dragging)return;
  yaw-=(e.clientX-px)*0.005; pitch+=(e.clientY-py)*0.005;
  pitch=Math.max(-1.35,Math.min(1.35,pitch)); px=e.clientX; py=e.clientY; });
let pinchD=0;
dom.addEventListener('touchmove',e=>{ if(e.touches.length===2){ const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  if(pinchD) camDist=Math.max(150,Math.min(900,camDist+(pinchD-d)*0.6)); pinchD=d; e.preventDefault(); } },{passive:false});
dom.addEventListener('touchend',()=>pinchD=0);

// ---- controls ----
// build heavy counts without freezing the UI silently
function rebuild(n){
  $('count').textContent='building '+fmt(n)+'…'; $('sliderVal').textContent=fmt(n);
  setTimeout(()=>{ try { build(n); } catch(err){ $('count').textContent='⚠ too many — out of memory'; } }, 30);
}
$('slider').addEventListener('input',e=>$('sliderVal').textContent=fmt(+e.target.value));
$('slider').addEventListener('change',e=>rebuild(+e.target.value));
$('max').addEventListener('click',()=>{ $('slider').value=10000000; rebuild(10000000); });
$('insane').addEventListener('click',()=>{ $('slider').value=$('slider').max; rebuild(25000000); });
$('billion').addEventListener('click',()=>{
  const ok = confirm(
    '⚠ 1,000,000,000 particles\n\n'+
    'This needs roughly 40+ GB of memory just for the data — far beyond any browser. '+
    'It will almost certainly run out of memory and may freeze or crash this tab.\n\n'+
    'Are you SURE you want to try? (it is very heavy)');
  if (ok) rebuild(1000000000);
});
$('top').addEventListener('click',()=>scrollTo({top:0,behavior:'smooth'}));
$('sound').addEventListener('click',()=>{ const btn=$('sound'), lbl=btn.querySelector('span');
  if(!audioOn){ startAudio(); btn.classList.add('on'); lbl.textContent='Sound ✓'; }
  else if(audio.state==='running'){ audio.suspend(); lbl.textContent='Sound off'; btn.classList.remove('on'); }
  else { audio.resume(); lbl.textContent='Sound ✓'; btn.classList.add('on'); } });
addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); readScroll(); });

// ---- go ----
loadEarth().then(()=>{ build(1_500_000); readScroll(); animate(); });
</script>
</body>
</html>
